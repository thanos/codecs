name: Test Livebooks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-livebooks-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_VERSION: "1.85"

jobs:
  test-livebooks:
    name: Test Livebooks (Elixir 1.18.4 / OTP 26.2)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18.4"
          otp-version: "26.2"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - run: sudo apt-get update && sudo apt-get install -y build-essential
      - uses: actions/cache@v4
        with:
          path: |
            _build
            deps
            native/ex_codecs_native/target
          key: livebooks-${{ runner.os }}-otp26-elixir1.18-mix${{ hashFiles('mix.lock') }}
          restore-keys: |
            livebooks-${{ runner.os }}-otp26-elixir1.18-
      - run: mix deps.get
        env:
          MIX_ENV: livebook
      - run: mix deps.compile
        env:
          MIX_ENV: livebook
      - run: mix compile
        env:
          MIX_ENV: livebook
      - run: mix livebook.test --mode local --verbose
        env:
          MIX_ENV: livebook