name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  ELIXIR_VERSION: "1.19.5"
  OTP_VERSION: "28.3.1"
  NIF_VERSION: "2.17"

jobs:
  build_nifs:
    name: NIF ${{ matrix.target }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
          - os: windows-2022
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1)" >> $GITHUB_ENV

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux GNU aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compilation dependencies (Linux musl)
        if: endsWith(matrix.target, '-unknown-linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation dependencies (Linux musl aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
          sudo ln -s /usr/aarch64-linux-gnu/bin/ld /usr/bin/aarch64-linux-gnu-ld

      - name: Build NIF
        id: build
        uses: philss/rustler-precompiled-action@v1.1.5
        env:
          RUSTUP_TOOLCHAIN: stable
        with:
          project-name: ex_codecs_native
          project-dir: native/ex_codecs_native
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.target }}
          nif-version: ${{ env.NIF_VERSION }}

      - name: Artifact attestation
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: ${{ steps.build.outputs.file-path }}

      - name: Verify artifact
        shell: bash
        run: |
          if [ ! -f "${{ steps.build.outputs.file-path }}" ]; then
            echo "::error::Build did not produce artifact: ${{ steps.build.outputs.file-path }}"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.file-name }}
          path: ${{ steps.build.outputs.file-path }}

  release:
    name: Create GitHub release
    needs: build_nifs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Flatten tarballs
        run: |
          mkdir -p nifs
          find release-artifacts -name '*.tar.gz' -exec cp {} nifs/ \;
          ls -la nifs/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: nifs/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_hex:
    name: Publish to Hex.pm
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      RUSTLER_PRECOMPILED_FORCE_BUILD_ALL: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Restore Mix dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-publish-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-deps-publish-

      - name: Restore Rust target cache
        uses: actions/cache@v4
        with:
          path: native/ex_codecs_native/target
          key: rust-target-publish-${{ hashFiles('native/ex_codecs_native/Cargo.lock', 'native/ex_codecs_native/src/**') }}
          restore-keys: |
            rust-target-publish-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile NIF from source
        run: mix compile

      - name: Generate checksum file from GitHub Release
        run: mix rustler_precompiled.download ExCodecs.Native --all --print 2>/dev/null

      - name: Publish to Hex
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}