# Precompiled NIFs for ExCodecs. Modeled on ExArrow / Explorer's release workflow.
# https://github.com/elixir-explorer/explorer/blob/main/.github/workflows/release.yml
# See: https://hexdocs.pm/rustler_precompiled/precompilation_guide.html
# Enable: Settings → Actions → General → Workflow permissions → Read and write.

name: Release

on:
  push:
    # Tag push  → full pipeline: build NIFs, create GitHub release, publish to Hex.pm.
    # Branch push → build NIFs only (release/publish jobs are skipped; no tag ref).
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "native/**"
      - ".github/workflows/release.yml"
  pull_request:
    paths:
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build_nifs:
    name: NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})
    runs-on: ${{ matrix.job.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    strategy:
      fail-fast: false
      matrix:
        nif: ["2.17"]
        job:
          # macOS — build both arches on Apple Silicon (macos-14) runners.
          # The "x86_64" build cross-compiles via `rustup target add`, avoiding the
          # scarce Intel macos-13 runners that can queue for a very long time.
          - { target: aarch64-apple-darwin, os: macos-14 }
          - { target: x86_64-apple-darwin, os: macos-14 }
          # Linux: native and cross (cross from-source works on any runner arch)
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-22.04 }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-22.04, use-cross: true }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04, use-cross: true }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-22.04, use-cross: true }
          # Windows
          - { target: x86_64-pc-windows-msvc, os: windows-2022 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/^  @version "\(.*\)"/\1/p' mix.exs | head -n1)" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Add target (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup default stable
          rustup target add ${{ matrix.job.target }}

      - name: Use GNU tar on macOS
        if: runner.os == 'macOS'
        run: |
          brew install gnu-tar
          echo "PATH=$(brew --prefix gnu-tar)/libexec/gnubin:$PATH" >> $GITHUB_ENV

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          prefix-key: ex-codecs-precomp
          shared-key: ${{ matrix.job.target }}-${{ matrix.nif }}
          workspaces: |
            native/ex_codecs_native

      - name: Build NIF
        id: build
        uses: philss/rustler-precompiled-action@v1.1.5
        env:
          RUSTUP_TOOLCHAIN: stable
        with:
          project-name: ex_codecs_native
          project-dir: native/ex_codecs_native
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.job.target }}
          nif-version: ${{ matrix.nif }}
          use-cross: ${{ matrix.job.use-cross || '' }}
          cross-version: ${{ matrix.job.cross-version || 'from-source' }}

      - name: Artifact attestation
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: ${{ steps.build.outputs.file-path }}

      - name: Verify artifact
        shell: bash
        run: |
          if [ ! -f "${{ steps.build.outputs.file-path }}" ]; then
            echo "::error::Build did not produce artifact: ${{ steps.build.outputs.file-path }}"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.file-name }}
          path: ${{ steps.build.outputs.file-path }}

  release:
    name: Create GitHub release
    needs: build_nifs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Flatten tarballs
        run: |
          mkdir -p nifs
          find release-artifacts -name '*.tar.gz' -exec cp {} nifs/ \;
          ls -la nifs/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: nifs/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_hex:
    name: Publish to Hex.pm
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    env:
      RUSTLER_PRECOMPILED_FORCE_BUILD_ALL: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.3.1"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Mix dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-publish-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-deps-publish-

      - name: Restore Rust target cache
        uses: actions/cache@v4
        with:
          path: native/ex_codecs_native/target
          key: rust-target-publish-${{ hashFiles('native/ex_codecs_native/Cargo.lock', 'native/ex_codecs_native/src/**') }}
          restore-keys: |
            rust-target-publish-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile NIF from source
        # Build the NIF locally so RustlerPrecompiled does not attempt a download
        # during the subsequent checksum generation step.
        run: mix compile

      - name: Generate checksum file from GitHub Release
        # Downloads all precompiled tarballs that were just attached to the
        # GitHub release and writes checksum-Elixir.ExCodecs.Native.exs.
        run: mix rustler_precompiled.download ExCodecs.Native --all --print 2>/dev/null

      - name: Publish to Hex
        run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
